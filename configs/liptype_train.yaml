dataset:
  tfrecords_train: "rebuild_data/tfrecords_overlapped255/train-*.tfrecord"
  tfrecords_val: "rebuild_data/tfrecords_overlapped255/val-*.tfrecord"
  tfrecords_test: "rebuild_data/tfrecords_overlapped255/test-*.tfrecord"
  max_frames: 75
  img_h: 50
  img_w: 100
  img_c: 3
  max_text_len: 32

train:
  batch_size: 50
  epochs: 550
  learning_rate: 1.0e-4
  shuffle_buffer: 4096
  seed: 55

  lr_schedule:
    type: reduce_on_plateau
    monitor: val_loss
    factor: 0.5
    patience: 4
    min_lr: 1.0e-6
    cooldown: 0
    min_delta: 0.0
    mode: auto

augment:
  horizontal_flip_prob: 0.5
  temporal_jitter_prob: 0.05

decode:
  beam_width: 200

