dataset:
  # Auto-AVSR aligned mouth TFRecords generated by:
  #   liptype2 preprocess grid-mouth-mp4-to-tfrecords ...
  tfrecords_train: "rebuild_data/tfrecords_grid_autoavsr/train-*.tfrecord"
  tfrecords_val: "rebuild_data/tfrecords_grid_autoavsr/val-*.tfrecord"
  tfrecords_test: "rebuild_data/tfrecords_grid_autoavsr/test-*.tfrecord"
  max_frames: 75
  img_h: 50
  img_w: 100
  img_c: 3
  max_text_len: 32

train:
  batch_size: 8
  # Start with a short run to validate the pipeline; increase later (e.g. 70).
  epochs: 2
  learning_rate: 1.0e-4
  shuffle_buffer: 2048
  seed: 55

augment:
  horizontal_flip_prob: 0.5
  temporal_jitter_prob: 0.05

decode:
  beam_width: 50

