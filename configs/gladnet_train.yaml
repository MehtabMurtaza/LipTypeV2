data:
  low_dir: "GladNetData/Low"
  normal_dir: "GladNetData/Normal"
  # Paper split: 4,000 train / 1,000 test (from 5,000 total paired images)
  train_count: 4000
  val_count: 1000
  # Ensure MS-SSIM has enough resolution for multiscale pyramid.
  image_size: 256

model:
  # Paper uses alpha ≈ 0.816 for MSSSIM-L1
  alpha: 0.816

train:
  batch_size: 16
  epochs: 70
  # MS-SSIM gradients can be unstable at higher LR; 1e-4 is a safer default.
  learning_rate: 1.0e-4
  # Clip gradients to prevent NaNs right after the first update step.
  clipnorm: 1.0
  # Warm up with pure L1 before introducing MS-SSIM (prevents NaNs at step 1).
  warmup_steps: 2000
  seed: 55

