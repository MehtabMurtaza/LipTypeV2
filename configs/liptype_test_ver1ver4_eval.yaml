dataset:
  tfrecords_train: "rebuild_data/tfrecords_liptype_test_ver1ver4/test-*.tfrecord"
  tfrecords_val: "rebuild_data/tfrecords_liptype_test_ver1ver4/test-*.tfrecord"
  tfrecords_test: "rebuild_data/tfrecords_liptype_test_ver1ver4/test-*.tfrecord"
  max_frames: 75
  img_h: 50
  img_w: 100
  img_c: 3
  # ver1/ver4 phrases are short (GRID-style)
  max_text_len: 32

train:
  batch_size: 8
  seed: 55
  shuffle_buffer: 512

decode:
  beam_width: 200

