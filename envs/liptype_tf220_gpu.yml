name: liptype_tf220_gpu
channels:
  - conda-forge
dependencies:
  - python=3.10.19
  - pip=24.2
  - pip:
      # Keep NumPy < 2 for binary wheels like OpenCV.
      - numpy==1.26.4

      # TensorFlow 2.20 with NVIDIA CUDA libs via pip (no conda cudatoolkit needed)
      - tensorflow[and-cuda]==2.20.0

      # Project runtime deps (pinned)
      - opencv-python==4.8.1.78
      - pyyaml==6.0.1
      - tqdm==4.66.2

      # Typer/Click pinned to avoid CLI incompatibilities on some clusters
      - typer==0.12.3
      - click==8.1.7
      - rich==13.7.1
      - shellingham==1.5.4

